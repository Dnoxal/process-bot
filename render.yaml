databases:
  - name: process-bot-db
    plan: free

services:
  - type: web
    name: process-bot
    env: python
    buildCommand: pip install -e . && npm install && npm run build
    startCommand: python -m process_bot.app
    envVars:
      - key: API_HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: process-bot-db
          property: connectionString
      - key: PROCESS_PUBLIC_DASHBOARD
        value: "true"
      - key: PROCESS_API_TOKEN
        sync: false
